name: Deploy to GitHub Pages

on:
  push:
    branches: "main"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Se eliminó la línea de cache para evitar el error
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Verifica si tu carpeta de salida es 'dist' o 'build'
          # Si es React normal suele ser 'build', si es Vite es 'dist'
          path: './build' 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
